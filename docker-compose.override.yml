services:
  web:
    command: /start-web-dev.sh
    volumes:
      - ./backend:/app
      - static_data:/app/staticfiles

  worker:
    command: [ "celery", "-A", "conf.celery_app", "worker", "-l", "INFO" ]
    volumes:
      - ./backend:/app

  celery_beat:
    volumes:
      - ./backend:/app

  mqtt-adapter:
    volumes:
      - ./backend:/app

  kafka-telemetry-writer:
    volumes:
      - ./backend:/app

  kafka-event-db-writer:
    volumes:
      - ./backend:/app

  kafka-event-notification-consumer:
    volumes:
      - ./backend:/app

  kafka-telemetry-validator:
    volumes:
      - ./backend:/app

  kafka-rule-engine:
    volumes:
      - ./backend:/app

  kafka-audit-writer:
    volumes:
      - ./backend:/app

volumes:
  static_data:
