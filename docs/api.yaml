    Rule:
      type: object
      description: Business logic rule for monitoring and alerting
      properties:
        id:
          type: integer
          example: 111
        name:
          type: string
          example: "High Temperature Alert"
        description:
          type: string
          example: "Alert when temperature exceeds 30°C"
        is_active:
          type: boolean
          example: true
        condition:
          description: Rule condition in JSON format (see docs/rules.md for full schema)
          oneOf:
            - $ref: '#/components/schemas/RuleConditionThreshold'
            - $ref: '#/components/schemas/RuleConditionRate'
            - $ref: '#/components/schemas/RuleConditionComposite'  
          example:
            type: "threshold"
            operator: ">"
            value: 30
        action:
          type: object
          description: Rule action in JSON format (see docs/rules.md for full schema)
          example:
            webhook:
              url: "https://webhook.site/a6bf3275-595d-42fd-b759-c42d74ce8c9e"
              enabled: true
            notification:
              channel: "email"
              enabled: true
              message: "High temperature in {device_name}: {value}°C"
        device_metric_id:
          type: integer
          description: Foreign key to DeviceMetric model
          example: 333 
      required:
        - id
        - name
        - is_active
        - condition
        - action
        - device_metric_id
      example:
        id: 1
        name: "High Temperature Alert"
        description: "Alert when temperature exceeds 30°C"
        is_active: true
        condition:
          type: "threshold"
          operator: ">"
          value: 30
        action:
          webhook:
            url: "https://webhook.site/a6bf3275-595d-42fd-b759-c42d74ce8c9e"
            enabled: true
          notification:
            channel: "email"
            enabled: true
            message: "High temperature in {device_name}: {value}°C"
        device_metric_id: 1

    RuleCreate:
      type: object
      description: Data required to create a new rule
      properties:
        schema_version:
          type: integer
          description: Version of the rule schema definition
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "High Temperature Alert"
        description:
          type: string
          maxLength: 1000
          example: "Alert when temperature exceeds 30°C"
        is_active:
          type: boolean
          default: true
          example: true
        condition:
          description: |
            Rule condition structure. Supported types:
            - threshold: Compare metric to value
            - rate: Count events in time window
            - composite: Combine multiple conditions with AND/OR
          oneOf:
            - $ref: '#/components/schemas/RuleConditionThreshold'
            - $ref: '#/components/schemas/RuleConditionRate'
            - $ref: '#/components/schemas/RuleConditionComposite'  
          example:
            type: "threshold"
            operator: ">"
            value: 30
        action:
          type: object
          description: Rule action in JSON format (see docs/rules.md for full schema)
          example:
            webhook:
              url: "https://webhook.site/a6bf3275-595d-42fd-b759-c42d74ce8c9e"
              enabled: true
            notification:
              channel: "email"
              enabled: true
              message: "High temperature in {device_name}: {value}°C"
        device_metric_id:
          type: integer
          description: Foreign key to DeviceMetric model
          example: 1
      required:
        - name
        - condition
        - is_active
        - action
        - device_metric_id
        - schema_version
      example:
        schema_version: 1
        name: "High Temperature Alert"
        description: "Alert when temperature exceeds 30°C"
        is_active: true
        condition:
          type: "threshold"
          operator: ">"
          value: 30
        action:
          webhook:
            url: "https://webhook.site/a6bf3275-595d-42fd-b759-c42d74ce8c9e"
            enabled: true
          notification:
            channel: "email"
            enabled: true
            message: "High temperature in {device_name}: {value}°C"
        device_metric_id: 1       


    RulePatch:
      type: object
      description: Partial update of rule fields
      properties:
        schema_version:
          type: integer
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        condition:
          type: object
        action:
          type: object
      example:
        is_active: false

    RuleConditionThreshold:
      type: object
      description: Threshold-based rule condition
      properties:
        type:
          type: string
          enum: [threshold]
          example: "threshold"
        operator:
          type: string
          enum: [">", ">=", "<", "<=", "==", "!="]
          example: ">"
        value:
          type: number
          example: 30
      required:
        - type
        - operator
        - value
      example:
        type: "threshold"
        operator: ">"
        value: 30

    RuleConditionRate:
      type: object
      description: Rate-based rule condition (event frequency)
      properties:
        type:
          type: string
          enum: [rate]
          example: "rate"
        count:
          type: integer
          minimum: 1
          description: Number of events threshold
          example: 10
        duration_minutes:
          type: integer
          minimum: 1
          description: Time window in seconds
          example: 300
      required:
        - type
        - count
        - duration_minutes
      example:
        type: "rate"
        count: 10
        duration_minutes: 300

    RuleConditionComposite:
      type: object
      description: Composite rule combining multiple conditions
      properties:
        type:
          type: string
          enum: [composite]
          example: "composite"
        operator:
          type: string
          enum: [AND, OR]
          example: "AND"
        conditions:
          type: array
          description: Array of sub-conditions (threshold or rate)
          items:
            oneOf:
              - $ref: '#/components/schemas/RuleConditionThreshold'
              - $ref: '#/components/schemas/RuleConditionRate'
          minItems: 2
      required:
        - type
        - operator
        - conditions
      example:
        type: "composite"
        operator: "AND"
        conditions:
          - type: "threshold"
            operator: ">"
            value: 35
          - type: "rate"
            count: 5
            duration_minutes: 20

    PaginatedRules:
      type: object
      properties:
        total:
          type: integer
          example: 25
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
      required:
        - total
        - limit
        - offset
        - items
      example:
        total: 25
        limit: 20
        offset: 0
        items:
          - id: 1
